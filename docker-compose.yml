services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: control_plane
      POSTGRES_USER: control_plane
      POSTGRES_PASSWORD: control_plane
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U control_plane -d control_plane"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      CONTROL_PLANE_ENVIRONMENT: dev
      CONTROL_PLANE_STORAGE_BACKEND: database
      CONTROL_PLANE_DATABASE_URL: postgresql+psycopg://control_plane:control_plane@db:5432/control_plane
      CONTROL_PLANE_DATABASE_ECHO: "false"
      CONTROL_PLANE_ARTIFACT_STORAGE_BACKEND: s3
      CONTROL_PLANE_S3_ENDPOINT_URL: http://minio:9000
      CONTROL_PLANE_S3_BUCKET: control-plane-playbooks
      CONTROL_PLANE_S3_ACCESS_KEY: minioadmin
      CONTROL_PLANE_S3_SECRET_KEY: minioadmin
      CONTROL_PLANE_S3_REGION: us-east-1
      CONTROL_PLANE_AGENT_REGISTRATION_TOKEN: bootstrap-secret
      CONTROL_PLANE_INVENTORY_RETENTION_LIMIT: "5"
      CONTROL_PLANE_EXECUTION_RETENTION_DAYS: "30"
      CONTROL_PLANE_AUDIT_RETENTION_DAYS: "90"
      CONTROL_PLANE_ADMIN_JWT_SECRET: change-me
      CONTROL_PLANE_BOOTSTRAP_ADMIN_USERNAME: admin
      CONTROL_PLANE_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  minio_data:
